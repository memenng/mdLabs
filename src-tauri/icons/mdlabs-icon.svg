<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#111113"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Single bold flask silhouette - centered -->
  <g transform="translate(512, 500)">
    <!-- Flask neck -->
    <rect x="-40" y="-280" width="80" height="140" rx="10" fill="url(#orange)"/>

    <!-- Flask neck rim -->
    <rect x="-56" y="-296" width="112" height="28" rx="14" fill="url(#orange)"/>

    <!-- Flask body -->
    <path d="M-40 -140 L-180 100 Q-210 160 -160 200 L160 200 Q210 160 180 100 L40 -140 Z"
          fill="url(#orange)"/>
  </g>
</svg>
